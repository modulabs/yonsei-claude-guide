<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>연세대학교 AX 캠프 Claude 환경세팅 가이드</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@latest/dist/web/static/pretendard.min.css" />
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    :root {
      --ink: #111827;
      --muted: #647084;
      --quiet: #8d98aa;
      --line: #e5e7eb;
      --paper: #fffaf5;
      --panel: #ffffff;
      --coral: #f7585c;
      --coral-deep: #d73f45;
      --navy: #202a5a;
      --mint: #00a896;
      --amber: #f59e0b;
      --code: #111827;
      --code-text: #e5e7eb;
      --shadow: 0 18px 45px rgba(17, 24, 39, 0.1);
      --radius: 8px;
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: "Pretendard", "Malgun Gothic", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        linear-gradient(90deg, rgba(247, 88, 92, 0.08) 1px, transparent 1px),
        linear-gradient(0deg, rgba(32, 42, 90, 0.05) 1px, transparent 1px),
        var(--paper);
      background-size: 32px 32px;
      color: var(--ink);
      line-height: 1.6;
      letter-spacing: 0;
    }

    a { color: inherit; }

    button, a {
      -webkit-tap-highlight-color: transparent;
    }

    .app {
      min-height: 100vh;
    }

    .hero {
      background: var(--ink);
      color: white;
      padding: 32px 18px 26px;
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(135deg, rgba(247, 88, 92, 0.24), transparent 42%),
        repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.06) 0 1px, transparent 1px 60px);
      pointer-events: none;
    }

    .hero-inner {
      width: min(1180px, 100%);
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    .eyebrow {
      color: var(--coral);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(31px, 7.6vw, 76px);
      line-height: 1.06;
      font-weight: 900;
      max-width: 880px;
      word-break: keep-all;
      overflow-wrap: break-word;
      letter-spacing: 0;
    }

    .hero p {
      margin: 18px 0 0;
      color: rgba(255, 255, 255, 0.76);
      max-width: 760px;
      font-size: clamp(15px, 3.8vw, 19px);
      word-break: normal;
      overflow-wrap: anywhere;
    }

    .hero-actions {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-top: 24px;
    }

    .action-link,
    .chip-button {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: rgba(255, 255, 255, 0.1);
      color: white;
      text-decoration: none;
      padding: 10px 13px;
      min-height: 42px;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 750;
      cursor: pointer;
      width: 100%;
      justify-content: center;
    }

    .action-link.primary {
      background: var(--coral);
      border-color: var(--coral);
    }

    .shell {
      width: min(1180px, 100%);
      margin: 0 auto;
      padding: 18px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 18px;
    }

    .quick-start {
      display: grid;
      gap: 10px;
      margin-top: -18px;
      position: relative;
      z-index: 2;
    }

    .quick-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: 0 12px 24px rgba(17, 24, 39, 0.08);
      padding: 16px;
      display: grid;
      grid-template-columns: 42px 1fr;
      gap: 12px;
      align-items: start;
    }

    .quick-num {
      width: 42px;
      height: 42px;
      border-radius: var(--radius);
      background: var(--ink);
      color: white;
      display: grid;
      place-items: center;
      font-weight: 900;
      font-size: 16px;
    }

    .quick-card:nth-child(2) .quick-num { background: var(--coral); }
    .quick-card:nth-child(3) .quick-num { background: var(--navy); }
    .quick-card:nth-child(4) .quick-num { background: var(--mint); }

    .quick-card h2 {
      margin: 0 0 4px;
      font-size: 17px;
      line-height: 1.35;
    }

    .quick-card p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      word-break: keep-all;
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr;
      gap: 18px;
    }

    .toc {
      background: rgba(255, 255, 255, 0.86);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 14px;
      box-shadow: 0 8px 24px rgba(17, 24, 39, 0.06);
    }

    .toc-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--muted);
      font-weight: 850;
      margin-bottom: 10px;
    }

    .toc-list {
      display: grid;
      gap: 4px;
    }

    .toc a {
      display: block;
      text-decoration: none;
      padding: 9px 10px;
      border-radius: var(--radius);
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .toc a:hover,
    .toc a.active {
      background: #fff0f0;
      color: var(--coral-deep);
    }

    .content {
      display: grid;
      gap: 18px;
      min-width: 0;
    }

    .section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      scroll-margin-top: 18px;
    }

    .section-head {
      padding: 18px 18px 14px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(90deg, #ffffff, #fff6f6);
    }

    .section-label {
      color: var(--coral);
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
      margin-bottom: 5px;
    }

    .section h2 {
      margin: 0;
      font-size: clamp(22px, 5.5vw, 32px);
      line-height: 1.25;
      word-break: keep-all;
    }

    .section-body {
      padding: 18px;
      display: grid;
      gap: 14px;
    }

    .section-body h3 {
      margin: 12px 0 0;
      font-size: 18px;
      line-height: 1.35;
    }

    .section-body p {
      margin: 0;
      color: var(--muted);
      word-break: keep-all;
    }

    .note {
      border-left: 4px solid var(--coral);
      background: #fff5f5;
      padding: 12px 13px;
      color: #4b5563;
      border-radius: 0 var(--radius) var(--radius) 0;
    }

    .grid {
      display: grid;
      gap: 12px;
    }

    .grid.two,
    .grid.three {
      grid-template-columns: 1fr;
    }

    .mini-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 14px;
      background: #fbfcfe;
    }

    .mini-card strong {
      display: block;
      margin-bottom: 5px;
      color: var(--ink);
      font-size: 15px;
    }

    .mini-card span {
      color: var(--muted);
      font-size: 14px;
    }

    .step-list {
      display: grid;
      gap: 10px;
      counter-reset: step;
    }

    .step {
      counter-increment: step;
      display: grid;
      grid-template-columns: 34px 1fr;
      gap: 10px;
      align-items: start;
    }

    .step::before {
      content: counter(step);
      width: 34px;
      height: 34px;
      border-radius: var(--radius);
      background: var(--coral);
      color: white;
      display: grid;
      place-items: center;
      font-weight: 900;
      font-size: 13px;
    }

    .step p {
      padding-top: 4px;
    }

    .code-card {
      background: var(--code);
      color: var(--code-text);
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid #1f2937;
    }

    .code-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 9px 10px;
      border-bottom: 1px solid #263244;
      background: #0b1220;
      color: #9ca3af;
      font-size: 12px;
      font-weight: 800;
    }

    .copy-button {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid #334155;
      background: #172033;
      color: #e5e7eb;
      border-radius: 6px;
      padding: 7px 9px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 800;
    }

    pre {
      margin: 0;
      padding: 14px;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: Consolas, "SFMono-Regular", Menlo, monospace;
      font-size: 13px;
      line-height: 1.55;
    }

    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: var(--radius);
    }

    table {
      width: 100%;
      min-width: 620px;
      border-collapse: collapse;
      background: white;
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
      font-size: 14px;
    }

    th {
      background: var(--ink);
      color: white;
      font-weight: 850;
    }

    td {
      color: var(--muted);
    }

    .checklist {
      display: grid;
      gap: 8px;
    }

    .check-item {
      display: grid;
      grid-template-columns: 24px 1fr;
      gap: 10px;
      align-items: start;
      padding: 11px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fbfcfe;
      cursor: pointer;
    }

    .box {
      width: 22px;
      height: 22px;
      border-radius: 6px;
      border: 2px solid #cbd5e1;
      display: grid;
      place-items: center;
      color: white;
      transition: 0.16s ease;
    }

    .check-item.done .box {
      background: var(--mint);
      border-color: var(--mint);
    }

    .check-item.done span {
      color: var(--quiet);
      text-decoration: line-through;
    }

    .bottom-bar {
      position: sticky;
      bottom: 0;
      z-index: 20;
      background: rgba(17, 24, 39, 0.94);
      color: white;
      padding: 10px 14px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
    }

    .bottom-inner {
      width: min(1180px, 100%);
      margin: 0 auto;
      display: grid;
      gap: 8px;
    }

    .progress-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.78);
      font-weight: 800;
    }

    .progress-track {
      height: 7px;
      background: rgba(255, 255, 255, 0.16);
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0;
      background: var(--coral);
      transition: width 0.2s ease;
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .submit-panel,
    .contact-panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff7f7;
      padding: 16px;
      display: grid;
      gap: 12px;
    }

    .submit-panel h3,
    .contact-panel h3 {
      margin: 0;
      font-size: 18px;
      line-height: 1.35;
    }

    .submit-panel p,
    .contact-panel p {
      margin: 0;
    }

    .mail-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--coral-deep);
      font-weight: 900;
      text-decoration: none;
      word-break: break-all;
    }

    .link-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      text-decoration: none;
      border: 1px solid var(--line);
      padding: 9px 10px;
      border-radius: var(--radius);
      color: var(--navy);
      background: #f8fafc;
      font-size: 14px;
      font-weight: 800;
    }

    .footer {
      color: var(--quiet);
      font-size: 13px;
      text-align: center;
      padding: 26px 0 12px;
    }

    @media (min-width: 740px) {
      .hero { padding: 52px 28px 46px; }
      .hero-actions { display: flex; flex-wrap: wrap; }
      .action-link,
      .chip-button { width: auto; justify-content: flex-start; }
      .shell { padding: 24px 28px 36px; gap: 24px; }
      .quick-start { grid-template-columns: repeat(4, 1fr); margin-top: -46px; }
      .quick-card { grid-template-columns: 1fr; }
      .grid.two { grid-template-columns: repeat(2, 1fr); }
      .grid.three { grid-template-columns: repeat(3, 1fr); }
      .section-body { padding: 24px; gap: 16px; }
    }

    @media (min-width: 1040px) {
      .layout {
        grid-template-columns: 260px minmax(0, 1fr);
        align-items: start;
      }

      .toc {
        position: sticky;
        top: 18px;
      }
    }

    @media (max-width: 420px) {
      .section-head,
      .section-body {
        padding-left: 15px;
        padding-right: 15px;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
    const { useEffect, useMemo, useState } = React;
    const h = React.createElement;

    const codeBlocks = {
      firstPrompt: `나는 연세대학교 AX 캠프에 참여하는 학생입니다.
Claude를 처음 쓰는 사람에게 가장 먼저 익혀야 할 기능 5가지를 알려줘.`,
      summarize: `아래 글을 읽고 1) 핵심 주장 2) 근거 3) 애매한 부분 4) 내가 추가로 확인해야 할 질문으로 나눠 정리해줘.`,
      ideate: `나는 [전공/관심사]를 바탕으로 3주 안에 실행 가능한 AI 프로젝트를 찾고 있어.
너무 거창하지 않고, 실제로 검증 가능한 주제 10개를 제안해줘.
각 주제마다 필요한 데이터와 예상 산출물도 붙여줘.`,
      critique: `아래 기획안을 심사위원 관점에서 냉정하게 검토해줘.
특히 실행 가능성, 근거 부족, 범위 과다, AI 활용의 진정성을 중심으로 지적해줘.`,
      voice: `아래 문장을 대학생이 직접 쓴 것처럼 자연스럽게 다듬어줘.
너무 광고 문구처럼 보이지 않게 하고, 핵심은 유지해줘.`,
      folder: `Documents/Yonsei_AX_Camp`,
      appCheck: `내가 오늘 Claude 앱 설치를 완료했는지 확인하는 체크리스트를 만들어줘.
Windows와 macOS 공통으로 볼 수 있게 정리해줘.`,
      coworkFolder: `이 폴더는 연세대 AX 캠프 작업 폴더입니다.
폴더 구조를 보고, 앞으로 연구/콘텐츠/사업 기획을 진행하기 좋은 하위 폴더 구조를 제안해줘.`,
      coworkReview: `내가 작성한 기획안 초안을 읽고,
1) 강점 2) 약점 3) 보완 질문 4) 다음에 만들어야 할 파일 목록으로 정리해줘.`,
      psInstall: `irm https://claude.ai/install.ps1 | iex`,
      psCheck: `claude --version
claude doctor`,
      psRun: `cd "$HOME\\Documents\\Yonsei_AX_Camp"
claude`,
      cmdInstall: `curl -fsSL https://claude.ai/install.cmd -o install.cmd && install.cmd && del install.cmd`,
      bashInstall: `curl -fsSL https://claude.ai/install.sh | bash`,
      bashRun: `cd ~/Documents/Yonsei_AX_Camp
claude`,
      readme: `이 폴더는 연세대 AX 캠프 실습 폴더야.
README.md를 만들고, 앞으로 작업할 폴더 구조와 파일 관리 규칙을 한국어로 정리해줘.
먼저 어떤 파일을 만들지 계획을 보여주고, 내가 승인하면 진행해줘.`,
      notes: `notes.md를 읽고 내용을 주제별로 정리해줘.
원본은 보존하고, 정리본은 summary.md로 새로 만들어줘.`,
      safe: `파일을 수정하기 전에 반드시 변경 계획을 먼저 보여줘.
삭제나 덮어쓰기가 필요한 경우에는 내 확인을 받은 뒤 진행해줘.`,
      omc: `내 프로젝트 주제를 기준으로 역할을 나눠 검토해줘.
1) 기기획자 관점 2) 사용자 관점 3) 실행 가능성 관점 4) 심사위원 관점으로 나눠서
강점, 리스크, 다음 액션을 정리해줘.`,
      omcMarketplace: `/plugin marketplace add https://github.com/Yeachan-Heo/oh-my-claudecode`,
      omcInstall: `/plugin install oh-my-claudecode`,
      omcSetup: `/setup`,
      omcVerify: `/help
/status
/omc-setup`,
      omcNpm: `npm i -g oh-my-claude-sisyphus@latest`
    };

    const sections = [
      { id: "goal", label: "00", title: "오늘의 목표" },
      { id: "compare", label: "01", title: "3가지 서비스 비교" },
      { id: "features", label: "02", title: "핵심 기능 (Artifacts/Skills)" },
      { id: "tools", label: "03", title: "한눈에 보는 준비물" },
      { id: "before", label: "04", title: "설치 전 체크" },
      { id: "login", label: "05", title: "Claude 로그인" },
      { id: "basics", label: "06", title: "기본 기능" },
      { id: "app", label: "07", title: "앱 설치" },
      { id: "cowork", label: "08", title: "Cowork" },
      { id: "code", label: "09", title: "Claude Code 설치" },
      { id: "practice", label: "10", title: "첫 실습" },
      { id: "omc", label: "11", title: "OMC 설치와 소개" },
      { id: "checklist", label: "12", title: "최종 체크" },
      { id: "trouble", label: "13", title: "문제 해결" },
      { id: "links", label: "14", title: "참고 링크" },
      { id: "contact", label: "15", title: "문의" }
    ];

    const checklist = [
      "Claude 웹 로그인 완료",
      "Claude 앱 설치 완료",
      "수업용 작업 폴더 생성 완료",
      "Claude 앱에서 간단한 질문 1회 이상 실행",
      "Chat / Cowork / Code 차이 숙지",
      "Artifacts·Skills·Diagrams·Designs 용어 이해",
      "Claude Code 설치 완료",
      "claude --version 실행 성공",
      "수업용 폴더에서 claude 실행 성공",
      "OMC 플러그인 설치 완료",
      "/setup 실행 완료",
      "/help 또는 /status에서 OMC 명령 확인",
      "개인정보 파일은 수업용 폴더에 넣지 않기"
    ];

    function Icon({ name, size = 16 }) {
      return h("i", { "data-lucide": name, style: { width: size, height: size } });
    }

    function CodeBlock({ label, value }) {
      const [copied, setCopied] = useState(false);
      const copy = async () => {
        try {
          await navigator.clipboard.writeText(value);
          setCopied(true);
          setTimeout(() => setCopied(false), 1300);
        } catch (error) {
          setCopied(false);
        }
      };

      return h("div", { className: "code-card" },
        h("div", { className: "code-top" },
          h("span", null, label),
